specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EulerVaultFactory
    network: {{{ network }}}
    source:
      abi: EVaultFactory
      address: "{{{ eVaultFactory }}}"
      startBlock: {{{ startBlock }}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - TrackingActiveAccount
        - TrackingVaultBalance
      abis:
        - name: EVaultFactory
          file: ./lib/euler-interfaces/abis/GenericFactory.json
        - name: EulerVault
          file: ./lib/euler-interfaces/abis/EVault.json
      eventHandlers:
        - event: ProxyCreated(indexed address,bool,address,bytes)
          handler: handleProxyCreated
      file: ./src/factories/euler-vault-factory.ts
  - kind: ethereum
    name: EulerEarnFactory
    network: {{{ network }}}
    source:
      abi: EulerEarnFactory
      address: "{{{ eulerEarnFactory }}}"
      startBlock: {{{ startBlock }}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - TrackingActiveAccount
        - TrackingVaultBalance
      abis:
        - name: EulerEarnFactory
          file: ./lib/euler-interfaces/abis/EulerEarnFactory.json
      eventHandlers:
        - event: CreateEulerEarn(indexed address,indexed address,address,uint256,indexed address,string,string,bytes32)
          handler: handleCreateEulerEarn
      file: ./src/factories/euler-earn-factory.ts
{{#securitizeFactory}}
  - kind: ethereum
    name: SecuritizeFactory
    network: {{{ network }}}
    source:
      abi: ERC4626EVCCollateralSecuritizeFactory
      address: "{{{ securitizeFactory }}}"
      startBlock: {{{ startBlock }}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - TrackingActiveAccount
        - TrackingVaultBalance
      abis:
        - name: ERC4626EVCCollateralSecuritizeFactory
          file: ./lib/euler-interfaces/abis/ERC4626EVCCollateralSecuritizeFactory.json
      eventHandlers:
        - event: ContractDeployed(indexed address,indexed address,uint256)
          handler: handleContractDeployed
      file: ./src/factories/base-factory.ts
{{/securitizeFactory}}
templates:
  - kind: ethereum
    name: EulerVault
    network: {{{ network }}}
    source:
      abi: EulerVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TrackingActiveAccount
        - TrackingVaultBalance
      abis:
        - name: EulerVault
          file: ./lib/euler-interfaces/abis/EVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Borrow(indexed address,uint256)
          handler: handleBorrow
        - event: Repay(indexed address,uint256)
          handler: handleRepay
        - event: PullDebt(indexed address,indexed address,uint256)
          handler: handlePullDebt
        - event: Liquidate(indexed address,indexed address,address,uint256,uint256)
          handler: handleLiquidate
        - event: ConvertFees(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleConvertFees
      file: ./src/euler-vault.ts
  - kind: ethereum
    name: ERC4626Vault
    network: {{{ network }}}
    source:
      abi: EulerEarn
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TrackingActiveAccount
        - TrackingVaultBalance
      abis:
        - name: EulerEarn
          file: ./lib/euler-interfaces/abis/EulerEarn.json
        - name: EulerVault
          file: ./lib/euler-interfaces/abis/EVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/erc4626-vault.ts
